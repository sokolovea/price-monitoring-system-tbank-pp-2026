volumes:
  postgres_data:
services:
  postgres:
    image: postgres:16
    container_name: price_hunter_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: price_hunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d/
    restart: unless-stopped