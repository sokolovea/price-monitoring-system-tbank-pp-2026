name: Deploy Project

on:
  push:
    branches:
      - feature/PMSYS-28

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
            cat > .env << EOF
            BOT_NAME=${{ secrets.BOT_NAME }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            BOT_BASE_URL=${{ secrets.SERVER_IP }}:443
            EOF

      - name: Build with docker-compose
        run: docker-compose up -d

      - name: Install certificates for telegram
        run: |
          curl -F "url=https://secrets.${{secrets.SERVER_IP}}:443/callback" \
               -F "certificate=@certificate.pem" \
               https://api.telegram.org/bot${{secrets.BOT_TOKEN}}/setWebhook