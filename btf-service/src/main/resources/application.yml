spring:
  application:
    name: btf-service
  kafka:
    bootstrap-servers: broker:9092
    #bootstrap-servers: localhost:9092
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://pricehunter-db:5432/${POSTGRES_DB}
    #url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public
    drop-first: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

notification-api:
  base-url: ${NOTIFICATION_API_BASE_URL}

integration-api:
  base-url: ${INTEGRATION_API_BASE_URL}

scheduler:
  delay: PT12H # ISO-8601 duration of 12 hours
  initialDelay: PT5S
  enabled: true

yandex:
  api-url: ${YANDEX_API_URL}
  api-key: ${YANDEX_API_KEY}
  folder-id: ${YANDEX_FOLDER_ID}
  command-path: ${YANDEX_COMMAND_PATH}
  model: ${YANDEX_MODEL}